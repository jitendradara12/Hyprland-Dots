# ---------------------------------------------------------------------
# NEW/MODIFIED BROWSER TAGS
# ---------------------------------------------------------------------
# Added support for Zen browser app identifier
windowrule {
  name = browser-zen
  match:class = ^(zen-alpha|zen|app.zen_browser.zen)$
  tag = +browser
}

# ---------------------------------------------------------------------
# MODIFIED PROJECTS TAG (VSCode)
# ---------------------------------------------------------------------
# Original: match:class = ^(VSCode|code|code-url-handler)$
# Changed:  removed standalone "code" from match
windowrule {
  name = projects-vscode
  match:class = ^(VSCode|code-url-handler)$
  tag = +projects
}

# ---------------------------------------------------------------------
# MODIFIED PICTURE-IN-PICTURE POSITION
# ---------------------------------------------------------------------
# Original: move 72% 7%
# Changed:  Dynamic cursor-relative positioning
windowrule {
  name = pip-position
  match:title = ^(Picture-in-Picture)$
  move = (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))
}

# ---------------------------------------------------------------------
# NEW WORKSPACE ASSIGNMENTS
# ---------------------------------------------------------------------

windowrule {
  name = workspace-zen
  match:class = ^(zen-alpha|zen|app.zen_browser.zen)$
  workspace = 1
}

windowrule {
  name = workspace-code
  match:class = ^(code)$
  workspace = 2
}

windowrule {
  name = workspace-neovide
  match:class = ^(neovide)$
  workspace = 2
}

windowrule {
  name = workspace-kitty
  match:class = ^(kitty)$
  workspace = 3
}

windowrule {
  name = workspace-chrome
  match:class = ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$
  workspace = 5
}

windowrule {
  name = workspace-thorium
  match:class = ^([Tt]horium-browser)$
  workspace = 2
}

windowrule {
  name = workspace-thunar
  match:class = ^([Tt]hunar)$
  workspace = 9
}

windowrule {
  name = workspace-nautilus
  match:class = ^(org.gnome.Nautilus)$
  workspace = 9
}

windowrule {
  name = workspace-obs
  match:class = ^(com.obsproject.Studio)$
  workspace = 4
}

windowrule {
  name = workspace-steam
  match:class = ^([Ss]team)$
  workspace = 5
}

windowrule {
  name = workspace-lutris
  match:class = ^([Ll]utris)$
  workspace = 5
}

windowrule {
  name = workspace-discord
  match:class = ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$
  workspace = 7
}

windowrule {
  name = workspace-ferdium
  match:class = ^([Ff]erdium)$
  workspace = 7
}

windowrule {
  name = workspace-whatsapp
  match:class = ^([Ww]hatsapp-for-linux)$
  workspace = 7
}

windowrule {
  name = workspace-virt-manager
  match:class = ^(virt-manager)$
  workspace = 6
}

windowrule {
  name = workspace-audacious
  match:class = ^([Aa]udacious)$
  workspace = 9
}

# ---------------------------------------------------------------------
# NEW CUSTOM FLOAT RULES (marked as "mine" in original)
# ---------------------------------------------------------------------

windowrule {
  name = float-vscode-add-folder
  match:class = (codium|codium-url-handler|VSCodium|code-oss)
  match:title = (Add Folder to Workspace)
  float = on
}

windowrule {
  name = float-electron-add-folder
  match:class = (electron)
  match:title = (Add Folder to Workspace)
  float = on
}

windowrule {
  name = float-vlc
  match:class = ^(vlc)$
  float = on
}

windowrule {
  name = float-kdeconnect
  match:class = ^(org.kde.kdeconnect.app)$
  float = on
}

windowrule {
  name = float-kdeconnect-title
  match:title = (KDE Connect)
  float = on
}

windowrule {
  name = float-sioyek
  match:class = ^(sioyek)
  float = on
}

windowrule {
  name = float-preferences
  match:title = (Preferences)
  float = on
}

windowrule {
  name = float-gnome-clocks
  match:class = ^(org.gnome.clocks)$
  float = on
}

# ---------------------------------------------------------------------
# MODIFIED OPACITY VALUES
# ---------------------------------------------------------------------
# Browser opacity changed from 0.99 0.8 to 0.86 0.84
windowrule {
  name = opacity-browser
  match:tag = browser*
  opacity = 0.86 0.84
}

# New VSCode-specific opacity rule
windowrule {
  name = opacity-vscode
  match:class = ^(code)$
  opacity = 0.9
}

# Duplicate/override VSCode opacity (appears later in file)
windowrule {
  name = vscode-opacity-blur
  match:class = ^(code)$
  opacity = 0.86
}

# ---------------------------------------------------------------------
# NEW SIZE RULES
# ---------------------------------------------------------------------

windowrule {
  name = size-sioyek
  match:class = ^(sioyek)$
  size = (monitor_w*0.65) (monitor_h*0.67)
}
windowrule {
  name = size-kdeconnect
  match:class = ^(org.kde.kdeconnect.app)$
  size = (monitor_w*0.52) (monitor_h*0.42)
}

windowrule {
  name = size-kdeconnect-settings
  match:title = (Settings — KDE Connect)
  size = (monitor_w*0.22) (monitor_h*0.27)
}

windowrule {
  name = size-gnome-clocks
  match:class = ^(org.gnome.clocks)$
  size = (monitor_w*0.32) (monitor_h*0.4)
}

# ---------------------------------------------------------------------
# NEW LAYER RULES
# ---------------------------------------------------------------------

layerrule {
  name = waybar-blur
  match:namespace = waybar
  blur = on
  ignore_alpha = 0
}

layerrule {
  name = swaync-control-center-blur
  match:namespace = swaync-control-center
  blur = on
}

layerrule {
  name = swaync-notification-blur
  match:namespace = swaync-notification-window
  blur = on
  ignore_alpha = 0
}

# ---------------------------------------------------------------------
# MODIFIED LAYER RULES (added ignore_alpha)
# ---------------------------------------------------------------------
# Original: layerrule = match:namespace rofi, blur on
# Changed:  Added ignore_alpha = 0
layerrule {
  name = rofi-blur
  match:namespace = rofi
  blur = on
  ignore_alpha = 0
}

# Original: layerrule = match:namespace notifications, blur on
# Changed:  Added ignore_alpha = 0
layerrule {
  name = notifications-blur
  match:namespace = notifications
  blur = on
  ignore_alpha = 0
}
