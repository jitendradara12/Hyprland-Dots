# User Settings
# This is where you put your own settings as this will not be touched during update 
# if the upgrade.sh is used.

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables/

# NOTE: some settings are in ~/.config/hypr/UserConfigs/UserDecorAnimations.conf

# dwindle {
#   pseudotile = true
#   preserve_split = true
#   #smart_split = true
#   special_scale_factor = 0.8
# }

master {
  new_status = master
  new_on_top = 1
  mfact = 0.5
}

general {
  border_size = 0
  gaps_in = 0
  gaps_out = 0

  resize_on_border = true
 
#  col.active_border = $backgroundCol  
#  col.active_border = $color12 
#  col.inactive_border = $backgroundCol
   
 
  layout = dwindle
}

input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  repeat_rate = 50
  repeat_delay = 300
  
  sensitivity = 0.49 #mouse sensitivity
  numlock_by_default = true
  left_handed = false
  follow_mouse = true
  float_switch_override_focus = false

  touchpad {
  
    disable_while_typing = true
    natural_scroll = true 
    clickfinger_behavior = false
    middle_button_emulation = true
    tap-to-click = true
    drag_lock = false
          }
  
  # below for devices with touchdevice ie. touchscreen
	touchdevice {
		enabled = false
	}
	
	# below is for table see link above for proper variables
	tablet {
		transform = 0
		left_handed = 0
	}
}


gestures {
    # General swipe behavior ~!!!!!!!!!!!!!!!!!!!!!all mine!!!!!!!!!!!!!!
    workspace_swipe_distance = 400
    workspace_swipe_invert = true # Set to true if you want the direction inverted
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.02
    workspace_swipe_create_new = true
    workspace_swipe_forever = true

    # --------------------------------------------------------------------------- #

    # Workspace Swiping (4 fingers)
    gesture = 4, horizontal, workspace
    # Same as Super + D
    gesture = 3, down, dispatcher, exec, swaync-client -t -sw # swayNC notification panel
    # Same as Super + A
    gesture = 3, up, dispatcher, exec, $scriptsDir/OverviewToggle.sh 
    # Same as Super + Shift + Return
    gesture = 4, down, dispatcher, exec, $scriptsDir/Dropterminal.sh $term
    #ALT+TAB
    #
    gesture = 3, left, dispatcher, cyclenext, prev
    gesture = 3, right, dispatcher, cyclenext

    gesture = 3, pinchin, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.5}')"
    gesture = 3, pinchout, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.5}')" 


    # ---------------------------end------------------------------------------------ #
}




group {
  col.border_active = $color15

	groupbar {
		col.active = $color0
 }
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  # vfr = true
  vrr = 2
  mouse_move_enables_dpms = true
  enable_swallow = off
  swallow_regex = ^(kitty)$
  focus_on_activate = false
  initial_workspace_tracking = 0
  middle_click_paste = false
  enable_anr_dialog = true    # Application not Responding (ANR)
  anr_missed_pings = 15       # ANR Threshold default 1 is too low
  allow_session_lock_restore = true  # Prevent lockscreen crash when resume from suspend
}

#opengl {
#  nvidia_anti_flicker = true
#}

binds {
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}

#Could help when scaling and not pixelating
xwayland {
  force_zero_scaling = true
}

# render section for Hyprland >= v0.42.0
render {
  direct_scanout = false
}

cursor {
  sync_gsettings_theme = true
  no_hardware_cursors = 2 # change to 1 if want to disable
  enable_hyprcursor = true
  warp_on_change_workspace = 2
  no_warps = true 
}
